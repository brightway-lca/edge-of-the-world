site_name: edge-of-the-world
site_description: An alternate Brightway backend with rich, flexible edge descriptions
site_author: Chris Mutel
repo_url: https://github.com/brightway-lca/edge-of-the-world
repo_name: brightway-lca/edge-of-the-world

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Interpreters:
    - Overview: interpreters/index.md
    - Standard: interpreters/standard.md
    - Temporal: interpreters/temporal.md
    - Loss: interpreters/loss.md
    - Scenario: interpreters/scenario.md
    - Provider mix: interpreters/provider_mix.md
  - Contributing: contributing.md
  - Changelog: changelog.md
